<button (click)="open()">create</button><br><br>



<mat-form-field>
  <mat-label>Filter</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Mia" #input>
</mat-form-field>

<div class="mat-elevation-z8">
  <table mat-table [dataSource]="dataSource" matSort>

    <!--  -->
    <ng-container matColumnDef="1">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>id </th>
      <td mat-cell *matCellDef="let row"> {{row.id}} </td>
    </ng-container>

    <!--  -->
    <ng-container matColumnDef="2">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>  title </th>
      <td mat-cell *matCellDef="let row"> {{row.Titre}} </td>
    </ng-container>

    <!---->
    <ng-container matColumnDef="3">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>  datedebut </th>
      <td mat-cell *matCellDef="let row"> {{row.datedebut | date}} </td>
    </ng-container>

    <!--  -->
    <ng-container matColumnDef="4">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> datefin </th>
      <td mat-cell *matCellDef="let row"> {{row.datefin | date}} </td>
    </ng-container>
    <!---->
    <ng-container matColumnDef="5">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> lieu </th>
      <td mat-cell *matCellDef="let row"> {{row.Lieu}} </td>
    </ng-container>

     <ng-container matColumnDef="6">
    <th mat-header-cell *matHeaderCellDef mat-sort-header> Action </th>
    <td mat-cell *matCellDef="let row">
      <button (click)="openedit(row.id)"><mat-icon>edit</mat-icon></button>
      <!-- <button (click)="openedelete(row.id)"><mat-icon>delete</mat-icon></button>
      <button (click)="openview(row.id)"><mat-icon>visibility</mat-icon></button>
      <button (click)="openassign(row.id)"><mat-icon>assignment_ind</mat-icon></button> -->

    </td>
  </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Row shown when there is no matching data. -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
    </tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users"></mat-paginator>
</div>
